version: '3'

includes:
  api:
    taskfile: ./api/Taskfile.yml
    dir: ./api
  admin:
    taskfile: ./admin/Taskfile.yml
    dir: ./admin

tasks:
  # ===========================================================================
  # Docker Compose Commands
  # ===========================================================================
  up:
    desc: Start all containers
    cmds:
      - docker compose up -d

  up:dev:
    desc: Start all containers including dev services (node)
    cmds:
      - docker compose --profile dev up -d

  up:full:
    desc: Start all containers including optional services (minio, elasticsearch)
    cmds:
      - docker compose --profile dev --profile storage --profile search up -d

  down:
    desc: Stop all containers
    cmds:
      - docker compose down

  down:volumes:
    desc: Stop all containers and remove volumes
    cmds:
      - docker compose down -v

  restart:
    desc: Restart all containers
    cmds:
      - docker compose restart

  logs:
    desc: Tail all container logs
    cmds:
      - docker compose logs -f

  logs:php:
    desc: Tail PHP container logs
    cmds:
      - docker compose logs -f php

  logs:nginx:
    desc: Tail Nginx container logs
    cmds:
      - docker compose logs -f nginx

  ps:
    desc: Show running containers
    cmds:
      - docker compose ps

  # ===========================================================================
  # Build Commands
  # ===========================================================================
  build:
    desc: Build all containers
    cmds:
      - docker compose build

  build:nocache:
    desc: Build all containers without cache
    cmds:
      - docker compose build --no-cache

  # ===========================================================================
  # Shell Access
  # ===========================================================================
  shell:php:
    desc: Open shell in PHP container
    cmds:
      - docker compose exec php sh

  shell:node:
    desc: Open shell in Node container
    cmds:
      - docker compose exec node sh

  shell:db:
    desc: Open psql shell in database container
    cmds:
      - docker compose exec database psql -U $POSTGRES_USER -d $POSTGRES_DB
    env:
      POSTGRES_USER: '{{.POSTGRES_USER | default "psychedcms"}}'
      POSTGRES_DB: '{{.POSTGRES_DB | default "psychedcms"}}'

  # ===========================================================================
  # Quick Setup
  # ===========================================================================
  install:
    desc: Install all dependencies (composer + npm)
    cmds:
      - task: api:install
      - task: admin:install

  setup:
    desc: Full project setup (build, start, install deps, run migrations)
    cmds:
      - task: hosts:check
      - task: build
      - task: up:dev
      - task: install
      - task: api:migrate

  # ===========================================================================
  # Hosts Management
  # ===========================================================================
  hosts:check:
    desc: Check if APP_DOMAIN is in /etc/hosts
    vars:
      APP_DOMAIN:
        sh: grep -oP '^APP_DOMAIN=\K.*' .env || echo "psychedcms.local"
    cmds:
      - |
        if grep -q "{{.APP_DOMAIN}}" /etc/hosts; then
          echo "✓ {{.APP_DOMAIN}} is configured in /etc/hosts"
        else
          echo "✗ {{.APP_DOMAIN}} is NOT in /etc/hosts"
          echo ""
          echo "Run the following command to add it:"
          echo "  sudo sh -c 'echo \"127.0.0.1 {{.APP_DOMAIN}}\" >> /etc/hosts'"
          echo ""
          echo "Or run: task hosts:add"
        fi
    silent: true

  hosts:add:
    desc: Add APP_DOMAIN to /etc/hosts (requires sudo)
    vars:
      APP_DOMAIN:
        sh: grep -oP '^APP_DOMAIN=\K.*' .env || echo "psychedcms.local"
    cmds:
      - sudo sh -c 'echo "127.0.0.1 {{.APP_DOMAIN}}" >> /etc/hosts'
      - echo "✓ Added {{.APP_DOMAIN}} to /etc/hosts"

  open:
    desc: Open the application in the default browser
    vars:
      APP_DOMAIN:
        sh: grep -oP '^APP_DOMAIN=\K.*' .env || echo "psychedcms.local"
    cmds:
      - xdg-open "http://{{.APP_DOMAIN}}" 2>/dev/null || open "http://{{.APP_DOMAIN}}" 2>/dev/null || echo "Open http://{{.APP_DOMAIN}} in your browser"

  # ===========================================================================
  # Cleanup
  # ===========================================================================
  clean:
    desc: Remove all containers, volumes, and build cache
    cmds:
      - docker compose down -v --rmi local
      - docker builder prune -f

  # ===========================================================================
  # Testing
  # ===========================================================================
  test:all:
    desc: Run all tests (api + admin + packages)
    cmds:
      - task: api:test
      - task: admin:test

  # ===========================================================================
  # Git - Main Project (atomic operations)
  # ===========================================================================
  git:status:
    desc: Show git status for main project
    cmds:
      - echo "=== Main Project ===" && git status -s && git log -1 --oneline

  git:status:all:
    desc: Show git status for main project and all packages
    cmds:
      - task: git:status
      - task: api:git:status:core
      - task: api:git:status:search
      - task: api:git:status:workflow

  git:branch:
    desc: Show current branch for main project
    cmds:
      - git branch --show-current


  # ===========================================================================
  # Feature Branch - Main Project (atomic operations)
  # ===========================================================================
  feature:ensure:
    desc: "Ensure feature branch exists on main project, create if needed"
    vars:
      FEATURE: '{{.FEATURE}}'
    cmds:
      - scripts/git-ensure-branch.sh . feature/{{.FEATURE}}

  feature:checkout:
    desc: "Checkout feature branch on main project"
    vars:
      FEATURE: '{{.FEATURE}}'
    cmds:
      - git checkout feature/{{.FEATURE}}

  # ===========================================================================
  # Commit - Main Project (with lazy branch creation)
  # ===========================================================================
  commit:
    desc: "Commit main project with feature reference (creates branch if needed)"
    vars:
      FEATURE: '{{.FEATURE}}'
      MESSAGE: '{{.MESSAGE}}'
    cmds:
      - task: feature:ensure
        vars:
          FEATURE: '{{.FEATURE}}'
      - git add .
      - git commit -m "[feature/{{.FEATURE}}] {{.MESSAGE}}"

  # ===========================================================================
  # Push/Pull - Main Project
  # ===========================================================================
  push:
    desc: Push main project current branch
    cmds:
      - git push -u origin $(git branch --show-current)

  pull:
    desc: "Pull main project (current branch or specified: task pull BRANCH=x)"
    vars:
      BRANCH:
        sh: echo "${BRANCH:-$(git branch --show-current)}"
    cmds:
      - git checkout {{.BRANCH}}
      - git pull origin {{.BRANCH}}

  rebase:
    desc: "Rebase current feature branch onto main (updates main, rebases, force pushes)"
    cmds:
      - git fetch -p origin main:main
      - git rebase main
      - git push --force-with-lease origin $(git branch --show-current)

  # ===========================================================================
  # Merge - Main Project
  # ===========================================================================
  feature:merge:
    desc: "Squash merge feature to main on main project"
    vars:
      FEATURE: '{{.FEATURE}}'
    cmds:
      - git checkout main
      - git pull origin main
      - git merge --squash feature/{{.FEATURE}}
      - cmd: 'git commit -m "feat: {{.FEATURE}}"'

  feature:push-merge:
    desc: Push merged main on main project
    cmds:
      - git push origin main

  feature:cleanup:
    desc: "Delete feature branch on main project (local and remote)"
    vars:
      FEATURE: '{{.FEATURE}}'
    cmds:
      - git branch -d feature/{{.FEATURE}} || true
      - git push origin --delete feature/{{.FEATURE}} || true
