version: '3'

tasks:
  # ===========================================================================
  # NPM / Dependencies
  # ===========================================================================
  install:
    desc: Install NPM dependencies
    cmds:
      - docker compose exec node npm install

  update:
    desc: Update NPM dependencies
    cmds:
      - docker compose exec node npm update

  add:
    desc: Add a new NPM dependency
    cmds:
      - docker compose exec node npm install {{.CLI_ARGS}}

  add:dev:
    desc: Add a new NPM dev dependency
    cmds:
      - docker compose exec node npm install --save-dev {{.CLI_ARGS}}

  # ===========================================================================
  # Development
  # ===========================================================================
  dev:
    desc: Start Vite dev server
    cmds:
      - docker compose exec node npm run dev

  # ===========================================================================
  # Build
  # ===========================================================================
  build:
    desc: Build for production
    cmds:
      - docker compose exec node npm run build

  preview:
    desc: Preview production build
    cmds:
      - docker compose exec node npm run preview

  # ===========================================================================
  # Code Quality
  # ===========================================================================
  lint:
    desc: Run all linting tools
    cmds:
      - task: eslint
      - task: typecheck

  eslint:
    desc: Run ESLint
    cmds:
      - docker compose exec node npm run lint

  eslint:fix:
    desc: Run ESLint with auto-fix
    cmds:
      - docker compose exec node npm run lint -- --fix

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - docker compose exec node npm run typecheck

  # ===========================================================================
  # Testing
  # ===========================================================================
  test:
    desc: Run tests
    cmds:
      - docker compose exec node npm run test {{.CLI_ARGS}}

  test:watch:
    desc: Run tests in watch mode
    cmds:
      - docker compose exec node npm run test -- --watch

  test:coverage:
    desc: Run tests with coverage
    cmds:
      - docker compose exec node npm run test -- --coverage
