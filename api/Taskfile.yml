  feature:push-merge:workflow:
    desc: Push merged main on psychedcms-workflow
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-workflow push origin main

  feature:cleanup:workflow:
    desc: "Delete feature branch on psychedcms-workflow (local and remote)"
    vars:
