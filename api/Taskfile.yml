version: '3'

vars:
  COMPOSE_FILE: '{{.ROOT_DIR}}/docker-compose.yml'
  PACKAGES_DIR: '{{.ROOT_DIR}}/packages'

tasks:
  # ===========================================================================
  # Composer / Dependencies
  # ===========================================================================
  install:
    desc: Install PHP dependencies
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php composer install --prefer-source

  update:
    desc: Update PHP dependencies
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php composer update --prefer-source

  require:
    desc: Add a new PHP dependency
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php composer require {{.CLI_ARGS}}

  # ===========================================================================
  # Database
  # ===========================================================================
  migrate:
    desc: Run database migrations
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/console doctrine:migrations:migrate --no-interaction

  migrate:diff:
    desc: Generate a migration diff
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/console doctrine:migrations:diff

  migrate:status:
    desc: Show migration status
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/console doctrine:migrations:status

  db:create:
    desc: Create the database
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/console doctrine:database:create --if-not-exists

  db:drop:
    desc: Drop the database
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/console doctrine:database:drop --force --if-exists

  db:reset:
    desc: Reset the database (drop, create, migrate)
    cmds:
      - task: db:drop
      - task: db:create
      - task: migrate

  # ===========================================================================
  # Symfony Console
  # ===========================================================================
  console:
    desc: Run Symfony console command
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/console {{.CLI_ARGS}}

  cache:clear:
    desc: Clear Symfony cache
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/console cache:clear

  # ===========================================================================
  # Testing
  # ===========================================================================
  test:
    desc: Run PHPUnit tests
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/phpunit {{.CLI_ARGS}}

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/phpunit --coverage-html var/coverage

  # ===========================================================================
  # Code Quality
  # ===========================================================================
  lint:
    desc: Run all linting tools
    cmds:
      - task: phpstan
      - task: cs:check

  phpstan:
    desc: Run PHPStan static analysis
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php vendor/bin/phpstan analyse

  cs:check:
    desc: Check code style with PHP-CS-Fixer
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php vendor/bin/php-cs-fixer fix --dry-run --diff

  cs:fix:
    desc: Fix code style with PHP-CS-Fixer
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php vendor/bin/php-cs-fixer fix

  # ===========================================================================
  # API Platform
  # ===========================================================================
  api:routes:
    desc: List all API routes
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/console debug:router --show-controllers | grep api

  # ===========================================================================
  # Package Testing - psychedcms-core
  # ===========================================================================
  test:core:
    desc: Run tests for psychedcms-core package
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} exec php bin/phpunit {{.PACKAGES_DIR}}/psychedcms-core/tests/

  # ===========================================================================
  # Git - psychedcms-core (atomic operations)
  # ===========================================================================
  git:status:core:
    desc: Show git status for psychedcms-core
    cmds:
      - echo "=== psychedcms-core ===" && git -C {{.PACKAGES_DIR}}/psychedcms-core status -s && git -C {{.PACKAGES_DIR}}/psychedcms-core log -1 --oneline

  git:branch:core:
    desc: Show current branch for psychedcms-core
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-core branch --show-current


  # Feature branch operations
  feature:ensure:core:
    desc: "Ensure feature branch exists on psychedcms-core, create if needed"
    vars:
      FEATURE: '{{.FEATURE}}'
    cmds:
      - ../scripts/git-ensure-branch.sh {{.PACKAGES_DIR}}/psychedcms-core feature/{{.FEATURE}}

  feature:checkout:core:
    desc: "Checkout feature branch on psychedcms-core"
    vars:
      FEATURE: '{{.FEATURE}}'
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-core checkout feature/{{.FEATURE}}

  # Commit operations (with lazy branch creation)
  commit:core:
    desc: "Commit psychedcms-core with feature reference (creates branch if needed)"
    vars:
      FEATURE: '{{.FEATURE}}'
      MESSAGE: '{{.MESSAGE}}'
    cmds:
      - task: feature:ensure:core
        vars:
          FEATURE: '{{.FEATURE}}'
      - cmd: 'git -C {{.PACKAGES_DIR}}/psychedcms-core add .'
      - cmd: 'git -C {{.PACKAGES_DIR}}/psychedcms-core commit -m "[feature/{{.FEATURE}}] core: {{.MESSAGE}}"'

  # Push/Pull operations
  push:core:
    desc: Push psychedcms-core current branch
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-core push -u origin $(git -C {{.PACKAGES_DIR}}/psychedcms-core branch --show-current)

  pull:core:
    desc: 'Pull psychedcms-core (current branch or specified via BRANCH=x)'
    vars:
      BRANCH:
        sh: echo "${BRANCH:-$(git -C {{.PACKAGES_DIR}}/psychedcms-core branch --show-current)}"
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-core checkout {{.BRANCH}}
      - git -C {{.PACKAGES_DIR}}/psychedcms-core pull origin {{.BRANCH}}

  rebase:core:
    desc: "Rebase current feature branch onto main on psychedcms-core (updates main, rebases, force pushes)"
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-core fetch -p origin main:main
      - git -C {{.PACKAGES_DIR}}/psychedcms-core rebase main
      - git -C {{.PACKAGES_DIR}}/psychedcms-core push --force-with-lease origin $(git -C {{.PACKAGES_DIR}}/psychedcms-core branch --show-current)

  # Merge operations
  feature:merge:core:
    desc: "Squash merge feature to main on psychedcms-core"
    vars:
      FEATURE: '{{.FEATURE}}'
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-core checkout main
      - git -C {{.PACKAGES_DIR}}/psychedcms-core pull origin main
      - git -C {{.PACKAGES_DIR}}/psychedcms-core merge --squash feature/{{.FEATURE}}
      - 'git -C {{.PACKAGES_DIR}}/psychedcms-core commit -m "feat: {{.FEATURE}}"'

  feature:push-merge:core:
    desc: Push merged main on psychedcms-core
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-core push origin main

  feature:cleanup:core:
    desc: "Delete feature branch on psychedcms-core (local and remote)"
    vars:
      FEATURE: '{{.FEATURE}}'
    cmds:
      - git -C {{.PACKAGES_DIR}}/psychedcms-core branch -d feature/{{.FEATURE}} || true
      - git -C {{.PACKAGES_DIR}}/psychedcms-core push origin --delete feature/{{.FEATURE}} || true
