services:
  # ===========================================================================
  # PHP-FPM (Symfony API)
  # ===========================================================================
  php:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
      target: dev
      args:
        PHP_VERSION: ${PHP_VERSION}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - ./api:/var/www/api:cached
      - ./packages:/var/www/packages:cached
    environment:
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN}
      MERCURE_URL: ${MERCURE_URL}
      MERCURE_PUBLIC_URL: ${MERCURE_PUBLIC_URL}
      MERCURE_JWT_SECRET: ${MERCURE_JWT_SECRET}
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - psyched

  # ===========================================================================
  # Nginx (Serves API + React Admin)
  # ===========================================================================
  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./api/public:/var/www/api/public:ro
      - ./api/var/storage/media:/var/www/api/var/storage/media:ro
      - ./admin/dist:/var/www/admin:ro
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx/conf.d
      NGINX_ENVSUBST_FILTER: ^APP_DOMAIN$$
    depends_on:
      - php
    networks:
      - psyched

  # ===========================================================================
  # Node (React Admin development)
  # ===========================================================================
  node:
    build:
      context: .
      dockerfile: .docker/node/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - ./admin:/var/www/admin:cached
      - ./packages:/var/www/packages:cached
    environment:
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"
    networks:
      - psyched
    profiles:
      - dev

  # ===========================================================================
  # PostgreSQL
  # ===========================================================================
  database:
    image: postgres:${POSTGRES_VERSION}-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - psyched

  # ===========================================================================
  # Mercure (Real-time updates hub)
  # ===========================================================================
  mercure:
    image: dunglas/mercure
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET}
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous
        cors_origins *
    ports:
      - "${MERCURE_PORT:-3000}:80"
    networks:
      - psyched

  # ===========================================================================
  # RabbitMQ (Message Queue)
  # ===========================================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - psyched

  # ===========================================================================
  # MinIO (S3-compatible object storage)
  # ===========================================================================
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9002:9000"
      - "9003:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - psyched

  # ===========================================================================
  # imgproxy (on-the-fly image processing and thumbnail generation)
  # ===========================================================================
  imgproxy:
    image: darthsim/imgproxy:latest
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      IMGPROXY_BASE_URL: s3://${MINIO_BUCKET}
      IMGPROXY_WORKERS: "10"
      IMGPROXY_MAX_SRC_RESOLUTION: "50"
      IMGPROXY_ALLOW_INSECURE_URLS: "true"
      IMGPROXY_AUTO_WEBP: "true"
      IMGPROXY_AUTO_AVIF: "true"
      IMGPROXY_CACHE_CONTROL_PASSTHROUGH: "false"
      IMGPROXY_SET_CANONICAL_HEADER: "false"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - psyched
    profiles:
      - media

  # ===========================================================================
  # imgproxy-proxy (Nginx URL translation for imgproxy)
  # ===========================================================================
  imgproxy-proxy:
    build:
      context: .docker/imgproxy-proxy
    depends_on:
      - imgproxy
    ports:
      - "8081:80"
    networks:
      - psyched
    profiles:
      - media

  # ===========================================================================
  # Elasticsearch - Optional
  # ===========================================================================
  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - psyched
    profiles:
      - search

networks:
  psyched:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  elasticsearch_data:
