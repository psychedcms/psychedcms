server {
    listen 80;
    server_name img.psychedcms.local;

    # Original images: /orig/path -> /insecure/plain/s3://psyched-media/{path}
    location ~ ^/orig/(.+)$ {
        set $image_path $1;
        proxy_pass http://imgproxy:8080/insecure/plain/s3://psyched-media/$image_path;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Thumbnails: /400x400/path -> /insecure/rs:fit:400:400/plain/s3://psyched-media/{path}
    location ~ ^/(\d+)x(\d+)/(.+)$ {
        set $width $1;
        set $height $2;
        set $image_path $3;
        proxy_pass http://imgproxy:8080/insecure/rs:fit:$width:$height/plain/s3://psyched-media/$image_path;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://imgproxy:8080/health;
    }
}
